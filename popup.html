<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 16px;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #fff;
    }
    
    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 12px;
    }
    
    textarea:focus {
      outline: none;
      border-color: #666;
    }
    
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .stat-label {
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
    }
    
    .stat-value {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    
    .savings {
      color: #4ade80;
    }
    
    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      background: #4a4a4a;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #5a5a5a;
    }
    
    button.primary {
      background: #3b82f6;
    }
    
    button.primary:hover {
      background: #2563eb;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .output-section {
      display: none;
    }
    
    .output-section.visible {
      display: block;
    }
    
    .section-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .comparison-item {
      padding: 12px;
      background: #252525;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .toast.show {
      opacity: 1;
    }
    
    .toast.error {
      background: #ef4444;
    }
    
    button.secondary {
      background: #555;
    }
    
    button.secondary:hover {
      background: #666;
    }
    
    .compression-levels {
      margin-bottom: 16px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
    }
    
    .level-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    
    .level-options {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }
    
    .level-radio {
      display: none;
    }
    
    .level-label-radio {
      padding: 8px 4px;
      text-align: center;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .level-radio:checked + .level-label-radio {
      background: #3b82f6;
      border-color: #2563eb;
      color: #fff;
    }

    .small-btn {
      padding: 10px;
      font-size: 13px;
    }

    .history {
      margin-bottom: 16px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
    }

    .history-select {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .history-select:focus {
      outline: none;
      border-color: #666;
    }

    .history-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .model-suggest {
      margin-bottom: 16px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
    }

    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .model-card {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
    }

    .model-tag {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
    }

    .model-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .model-reason {
      font-size: 11px;
      color: #b5b5b5;
      line-height: 1.35;
    }

    .model-note {
      font-size: 11px;
      color: #888;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <h1>⚡ Token Optimizer</h1>
  
  <textarea id="input" placeholder="Paste prompt here..." aria-label="Input prompt text"></textarea>
  
  <div class="compression-levels">
    <span class="level-label">Compression Level</span>
    <div class="level-options">
      <input type="radio" id="light" name="compression" value="light" class="level-radio">
      <label for="light" class="level-label-radio">Light</label>
      
      <input type="radio" id="medium" name="compression" value="medium" class="level-radio" checked>
      <label for="medium" class="level-label-radio">Medium</label>
      
      <input type="radio" id="aggressive" name="compression" value="aggressive" class="level-radio">
      <label for="aggressive" class="level-label-radio">Aggressive</label>
      
      <input type="radio" id="direct" name="compression" value="direct" class="level-radio">
      <label for="direct" class="level-label-radio">Direct</label>
    </div>
  </div>
  
  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">Tokens</span>
      <span class="stat-value" id="tokenCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Words</span>
      <span class="stat-value" id="wordCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Savings</span>
      <span class="stat-value savings" id="savings">-</span>
    </div>
  </div>
  
  <div class="buttons">
    <button id="optimizeBtn" class="primary" title="Optimize prompt (Ctrl+Enter)">Optimize</button>
    <button id="copyBtn" disabled title="Copy optimized text">Copy</button>
    <button id="resetBtn" class="secondary" title="Clear all text">Reset</button>
  </div>

  <div id="outputSection" class="output-section">
    <div class="section-title">Optimized Result</div>
    <textarea id="output" readonly aria-label="Optimized prompt result"></textarea>
  </div>

  <div class="history">
    <span class="level-label">Clipboard History</span>
    <select id="historySelect" class="history-select" aria-label="Clipboard history">
      <option value="">No recent items</option>
    </select>
    <div class="history-actions">
      <button id="useHistoryBtn" class="small-btn" title="Use selected history in input">Use</button>
      <button id="copyHistoryBtn" class="small-btn" title="Copy selected history item">Copy</button>
      <button id="clearHistoryBtn" class="secondary small-btn" title="Clear clipboard history">Clear</button>
    </div>
  </div>

  <div class="model-suggest">
    <span class="level-label">Model Suggestion</span>
    <div class="model-grid">
      <div class="model-card">
        <span class="model-tag">Best Quality</span>
        <div id="bestQualityModel" class="model-name">-</div>
        <div id="bestQualityReason" class="model-reason">Add a prompt to get a recommendation.</div>
      </div>
      <div class="model-card">
        <span class="model-tag">Best Value</span>
        <div id="bestValueModel" class="model-name">-</div>
        <div id="bestValueReason" class="model-reason">Add a prompt to get a recommendation.</div>
      </div>
    </div>
    <div id="modelSuggestNote" class="model-note">Heuristic recommendation using prompt type and length.</div>
  </div>
  
  <div id="toast" class="toast">Copied!</div>
  
  <script src="optimizer-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
